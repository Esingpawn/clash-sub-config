# ===== 良心云 订阅模板 =====
# 此文件包含规则配置，节点会被 GitHub Actions 自动填充

mixed-port: 7890
allow-lan: false
bind-address: '*'
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: safari

# ===== DNS 配置 =====
dns:
  enable: true
  ipv6: false
  default-nameserver: [223.5.5.5, 119.29.29.29]
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true
  proxy-server-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - https://223.5.5.5/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite: [gfw]
    ipcidr: [240.0.0.0/4]
    domain: [+.google.com, +.facebook.com, +.youtube.com]

# ===== 代理节点 (会被 GitHub Actions 自动替换) =====
proxies: []

# ===== 代理组 =====
proxy-groups:
  - name: 良心云
    type: select
    proxies:
      - 自动选择
      - 故障转移

  - name: 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 86400
    tolerance: 100
    proxies: []

  - name: 故障转移
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 7200
    proxies: []

  - name: 流媒体
    type: select
    proxies:
      - 良心云

  - name: AI服务
    type: select
    proxies:
      - 良心云

  - name: Telegram
    type: select
    proxies:
      - 良心云

  - name: 微软服务
    type: select
    proxies:
      - DIRECT
      - 良心云

  - name: 苹果服务
    type: select
    proxies:
      - DIRECT
      - 良心云

